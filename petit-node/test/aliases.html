<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.33.1/ace.js"></script>
<!--script src="../dist/index.js"></script>
<script src="setup.js"></script-->
<script type="module">
import {main,prt,sleep} from "./setup.js";
const fixture={
    "main.js": `
import * as ace from "ace";
import {urlToFile} from "pnode:main";
const home=urlToFile(import.meta.url).up();
document.body.innerHTML=home.rel("main.html").text();
const element=document.querySelector("#editor");
const editor=ace.edit(element);
editor.setValue(home.rel("main.js").text());
`,
    "main.html": `
<h1>Editor Example</h1>
<div id="editor" style="width:600; height:300;"></div>
`
};
const aliases = {ace};
await main(fixture, aliases);
await sleep();
const expected='Editor Example\n1\n2\n3\n4\n5\n6\n7\n8\n9\nimport * as ace from "ace";\nimport {urlToFile} from "pnode:main";\nconst home=urlToFile(import.meta.url).up();\ndocument.body.innerHTML=home.rel("main.html").text();\nconst element=document.querySelector("#editor");\nconst editor=ace.edit(element);\neditor.setValue(home.rel("main.js").text());';
const actual=document.body.innerText;
if (actual.match(/Editor Example/) && 
    actual.match(/ace\.edit/) &&
    actual.match(/editor\.setValue/)
) {
    prt("Passed");
} else {
    prt("Failed Actual:"+actual);
}
</script>
