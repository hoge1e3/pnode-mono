<body></body>
<script type="module">
import pNode from "../dist/index.js";
import {main,prt,checkPrt,sleep} from "./setup.js";
const fixture={
    "package.json":`{"type":"module"}`,
    "main.js": `
import {on} from "pnode:main";
import {foo,bar} from "./my_module.js";
on("error", (evt)=>{
    console.error(evt);
    foo("Uncaught: "+evt.error.stack);
});
try {
    foo(bar(21));
} catch(e) {
    console.error(e);
    foo("Caught: "+e.stack);
}
foo(bar(21));
`,
    "my_module.js": `
document.body.innerHTML+="<pre></pre>";
const pre=document.querySelector("pre");
export function foo(content) {
    pre.innerHTML+=content+"\\n";
}
export function bar(x) {
    return x*x.error.ocurres.here;
}
`,

};
pNode.on("error",(evt)=>{
    prt(evt);
});
main(fixture);
await sleep();
checkPrt((c)=>c.includes("Caught:") && c.includes("TypeError"));
</script>
