<script src="setup.js"></script-->
<script type="module">
import {main, prt, sleep,checkPrt} from "./setup.js";
import pNode from "../dist/index.js";
window.prt=prt;
const fixture={
    "package.json":`{"type":"module"}`,
    "main.js": `
import "./cjs.cjs";
import foo from "./foo.cjs";
import {inc} from "./foo.cjs";
prt(foo.inc());
prt(foo.inc===inc);
    `,
    "cjs.cjs": `
const foo=require("./foo.cjs");
const {inc}=require("./bar.cjs");
prt(foo.inc());
prt(inc());
`,
    "foo.cjs": `
const {inc}=require("./baz.cjs");
exports.inc=()=>"foo: "+inc();
`,
    "bar.cjs": `
const baz=require("./baz.cjs");
exports.inc=()=>"bar: "+baz.inc();
`,
    "baz.cjs": `
let c=0;
exports.inc=()=>c++;
prt("baz.cjs loaded");
`,
};
main(fixture);
await sleep();
pNode.FS.get("/node/baz.cjs").text(`
let c=0;
exports.inc=()=>c+=2;
prt("baz.cjs reloaded");
`);
await pNode.import(pNode.FS.get("/node/main.js"));
//pNode.require("/node/cjs.js");
await sleep();
checkPrt(`baz.cjs loaded
foo: 0
bar: 1
foo: 2
true
baz.cjs reloaded
foo: 2
bar: 4
foo: 6
true
`);
</script>
